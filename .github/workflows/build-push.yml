name: Build and Push Server Images

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Cattle Version
        id: cattle-version
        run: |
          VERSION=$(awk '/ENV CATTLE_CATTLE_VERSION/{print $3}' server/Dockerfile)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download custom cattle.jar
        run: |
          mkdir -p server/artifacts
          curl -sLf -o server/artifacts/cattle.jar https://github.com/giangndm/rancher-1.6-cattle/releases/download/${{ steps.cattle-version.outputs.version }}/cattle.jar

      - name: Download s6-overlay
        run: |
          mkdir -p server/target
          curl -sL -o server/target/s6-overlay-amd64-static.tar.gz https://github.com/just-containers/s6-overlay/releases/download/v1.19.1.1/s6-overlay-amd64.tar.gz

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Main Image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rancher-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Extract metadata for Master Image
        id: meta-master
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rancher-server
          tags: |
            type=ref,event=tag,suffix=-master
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push Main Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Dockerfile.master
        run: |
          # Use the newly built main image as the base for the master-flavored build
          # If we pushed to tags, use the tag version, otherwise use 'latest'
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BASE_TAG="${{ github.ref_name }}"
          else
            BASE_TAG="latest"
          fi
          cat > server/Dockerfile.master << EOF
          FROM ghcr.io/${{ github.repository_owner }}/rancher-server:${BASE_TAG}
          ENV CATTLE_MASTER true
          EOF

      - name: Build and push Master Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.master
          push: true
          tags: ${{ steps.meta-master.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
